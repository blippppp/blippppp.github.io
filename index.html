<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kingsly Roche — Data Engineer</title>
  <meta name="description" content="Kingsly Roche — Data Engineer with 8+ years experience in GCP, BigQuery, Ab Initio, Hadoop, SQL." />
  <style>
    :root{
      --bg:#071023;
      --card:#071426;
      --text:#e6eef6;
      --muted:#9aa6b2;
      --accent:#10b981;
      --radius:12px;
      --maxw:720px;
      --gap:12px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#071023,#071426);
      padding:24px;
      color:var(--text);
    }
    .card{
      width:100%;
      max-width:var(--maxw);
      background:var(--card);
      border-radius:var(--radius);
      padding:24px;
      box-shadow:0 8px 30px rgba(16,24,40,0.06);
      border:1px solid rgba(0,0,0,0.04);
    }
    header{display:flex;align-items:center;justify-content:space-between;gap:var(--gap);flex-wrap:wrap}
    h1{margin:0;font-size:1.5rem}
    .meta{color:var(--muted);font-size:.95rem}
    .tagline{color:var(--muted);margin:8px 0 0 0}
    .section{margin-top:20px}
    h2{margin:0 0 8px 0;font-size:1rem;color:var(--text)}
    .skills{display:flex;flex-wrap:wrap;gap:6px;margin:0}
    .skill-tag{
      padding:4px 10px;border-radius:999px;font-size:0.8rem;
      background:rgba(16,185,129,0.15);color:var(--accent)
    }
    .resume-link{display:inline-block;padding:10px 16px;background:rgba(5,150,105,0.1);border-radius:8px;color:var(--accent);font-weight:500;text-decoration:none}
    small{color:var(--muted)}
    a:focus{outline:3px solid rgba(16,185,129,0.3);outline-offset:3px}
  </style>
  <script>
    async function updateCounter(){
      const el = document.getElementById('counter');
      if(!el) return;
      el.textContent = '…';
      try{
        const r = await fetch('https://lzfxk8pfi3.execute-api.us-east-1.amazonaws.com/Prod/count/', {cache:'no-cache'});
        if(!r.ok) throw new Error('network');
        const text = await r.text();
        let data;
        try { data = JSON.parse(text); } catch(e) { data = text; }
        const count = (data && (data.Count ?? data.count)) ?? data;
        el.textContent = String(count ?? '—');
      } catch(e){
        el.textContent = '—';
        console.warn('counter', e);
      }
    }
    document.addEventListener('DOMContentLoaded', updateCounter);
  </script>
</head>
<body>
  <main class="card" role="main">
    <header>
      <div>
        <h1>Kingsly Roche</h1>
        <p class="tagline">Data Engineer — 8+ years experience</p>
        <p class="meta" style="margin:4px 0 0 0">Chennai, India</p>
      </div>
      <div class="meta"><small>total visits <span id="counter" aria-live="polite">Fetching...</span></small></div>
    </header>

    <section class="section">
      <h2>Skills</h2>
      <div class="skills">
        <span class="skill-tag">GCP</span>
        <span class="skill-tag">BigQuery</span>
        <span class="skill-tag">Ab Initio</span>
        <span class="skill-tag">Hadoop</span>
        <span class="skill-tag">SQL</span>
        <span class="skill-tag">Python</span>
        <span class="skill-tag">Spark</span>
        <span class="skill-tag">Unix</span>
      </div>
    </section>

    <section class="section">
      <h2>Resume</h2>
      <a href="Resume.pdf" class="resume-link" target="_blank" rel="noopener">View Resume (PDF)</a>
    </section>

    <section class="section">
      <h2>Connect</h2>
      <div class="skills">
        <a href="https://github.com/kingslyroche" class="skill-tag" target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/in/kingslyroche" class="skill-tag" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://kingslyroche.medium.com" class="skill-tag" target="_blank" rel="noopener">Medium</a>
        <a href="mailto:kingslyroche@gmail.com" class="skill-tag">Email</a>
      </div>
    </section>

    <footer class="section" style="margin-top:24px"><small>© <span id="year"></span> Kingsly Roche</small></footer>
  </main>
  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
</body>
</html>
